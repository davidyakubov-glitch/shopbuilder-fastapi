openapi: 3.0.3
info:
  title: ShopBuilder API
  version: 1.0.0
  description: >
    REST API contract for ShopBuilder, a multi-tenant Shopify-like e-commerce backend
    built with FastAPI, SQLModel, PostgreSQL, and Redis.
servers:
  - url: http://localhost:8000/api/v1
    description: Local development server
tags:
  - name: Auth
  - name: Stores
  - name: Themes
  - name: Products
  - name: Orders
  - name: Webhooks
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new store owner and create the first store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Store created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
              examples:
                created:
                  value:
                    access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    refresh_token: "d4ce0cfb-62ac-4d75-9dbe-69069485d40f"
                    token_type: "bearer"
                    expires_in: 900
                    store:
                      id: "store_01HZX8D5P7J9M3R4K5L6N7Q8R"
                      name: "Nomad Home"
                      subdomain: "nomad-home"
                      status: "draft"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate a user and issue JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /stores:
    get:
      tags: [Stores]
      summary: List stores available to the authenticated user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, active, suspended, archived]
        - in: query
          name: sort
          schema:
            type: string
            example: "-created_at"
      responses:
        '200':
          description: Paginated store list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /stores/{store_id}/themes:
    get:
      tags: [Themes]
      summary: List themes for a store
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StoreIdParam'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, published, archived]
        - in: query
          name: sort
          schema:
            type: string
            example: "-created_at"
      responses:
        '200':
          description: Paginated theme list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThemeListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /stores/{store_id}/themes/{theme_id}/publish:
    post:
      tags: [Themes]
      summary: Publish a draft theme and make it active
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StoreIdParam'
        - $ref: '#/components/parameters/ThemeIdParam'
      responses:
        '200':
          description: Theme published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Theme'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /stores/{store_id}/products:
    get:
      tags: [Products]
      summary: List products for a store
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StoreIdParam'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, active, archived]
        - in: query
          name: sort
          schema:
            type: string
            example: "-updated_at"
      responses:
        '200':
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Products]
      summary: Create a product with options and variant generation rules
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StoreIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /stores/{store_id}/orders:
    get:
      tags: [Orders]
      summary: List orders for a store
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StoreIdParam'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - in: query
          name: status
          schema:
            type: string
            enum: [pending_payment, paid, partially_fulfilled, fulfilled, cancelled, refunded]
        - in: query
          name: sort
          schema:
            type: string
            example: "-placed_at"
      responses:
        '200':
          description: Paginated order list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Orders]
      summary: Create an order from cart or direct checkout
      parameters:
        - $ref: '#/components/parameters/StoreIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '201':
          description: Order created in pending_payment state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /stores/{store_id}/webhooks/events:
    get:
      tags: [Webhooks]
      summary: List inbound webhook events for a store
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StoreIdParam'
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
        - in: query
          name: status
          schema:
            type: string
            enum: [queued, processing, processed, failed, dead_letter]
        - in: query
          name: sort
          schema:
            type: string
            example: "-received_at"
      responses:
        '200':
          description: Paginated webhook event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEventListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
  /stores/{store_id}/webhooks/inbound:
    post:
      tags: [Webhooks]
      summary: Receive a signed inbound webhook event
      parameters:
        - $ref: '#/components/parameters/StoreIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookInboundRequest'
      responses:
        '202':
          description: Event persisted for asynchronous processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAccepted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CursorParam:
      in: query
      name: cursor
      required: false
      schema:
        type: string
        example: "eyJzb3J0X2tleSI6IjIwMjYtMDQtMjRUMTA6MzA6MDBaIiwiaWQiOiJvcmRfMDEifQ=="
      description: Opaque cursor for keyset pagination.
    LimitParam:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    StoreIdParam:
      in: path
      name: store_id
      required: true
      schema:
        type: string
        example: "store_01HZX8D5P7J9M3R4K5L6N7Q8R"
    ThemeIdParam:
      in: path
      name: theme_id
      required: true
      schema:
        type: string
        example: "theme_01HZX8VY7PJQ8JY14EKE4GJ5R7"
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "bad_request"
              message: "Request payload is malformed."
              request_id: "req_01HZYA9RBK6P2Q11YTZ6K9M7K3"
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "unauthorized"
              message: "Missing or invalid bearer token."
              request_id: "req_01HZYA9RBK6P2Q11YTZ6K9M7K3"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "not_found"
              message: "Requested store was not found."
              request_id: "req_01HZYA9RBK6P2Q11YTZ6K9M7K3"
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "conflict"
              message: "Subdomain is already reserved."
              request_id: "req_01HZYA9RBK6P2Q11YTZ6K9M7K3"
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "internal_error"
              message: "Unexpected server error."
              request_id: "req_01HZYA9RBK6P2Q11YTZ6K9M7K3"
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
    ValidationError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id, fields]
          properties:
            code:
              type: string
              example: "validation_error"
            message:
              type: string
              example: "One or more fields are invalid."
            request_id:
              type: string
              example: "req_01HZYA9RBK6P2Q11YTZ6K9M7K3"
            fields:
              type: array
              items:
                type: object
                required: [field, message]
                properties:
                  field:
                    type: string
                    example: "email"
                  message:
                    type: string
                    example: "Value must be a valid email address."
    AuthTokens:
      type: object
      required: [access_token, refresh_token, token_type, expires_in, store]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: "bearer"
        expires_in:
          type: integer
          example: 900
        store:
          $ref: '#/components/schemas/Store'
    RegisterRequest:
      type: object
      required: [email, password, store_name, subdomain]
      properties:
        email:
          type: string
          format: email
          example: "owner@nomad-home.kz"
        password:
          type: string
          minLength: 8
          example: "StrongPass!2026"
        store_name:
          type: string
          example: "Nomad Home"
        subdomain:
          type: string
          example: "nomad-home"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "owner@nomad-home.kz"
        password:
          type: string
          example: "StrongPass!2026"
    Store:
      type: object
      required: [id, name, subdomain, status]
      properties:
        id:
          type: string
          example: "store_01HZX8D5P7J9M3R4K5L6N7Q8R"
        name:
          type: string
          example: "Nomad Home"
        subdomain:
          type: string
          example: "nomad-home"
        status:
          type: string
          enum: [draft, active, suspended, archived]
        custom_domain:
          type: string
          nullable: true
          example: "shop.nomad-home.kz"
    PaginationMeta:
      type: object
      required: [next_cursor, has_more]
      properties:
        next_cursor:
          type: string
          nullable: true
          example: "eyJwbGFjZWRfYXQiOiIyMDI2LTA0LTI0VDEwOjMwOjAwWiIsImlkIjoib3JkXzAxIn0="
        has_more:
          type: boolean
          example: true
    StoreListResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Store'
        page:
          $ref: '#/components/schemas/PaginationMeta'
    Theme:
      type: object
      required: [id, name, status, version_number, checksum]
      properties:
        id:
          type: string
          example: "theme_01HZX8VY7PJQ8JY14EKE4GJ5R7"
        name:
          type: string
          example: "Dawn Custom"
        status:
          type: string
          enum: [draft, published, archived]
        version_number:
          type: integer
          example: 4
        checksum:
          type: string
          example: "sha256:2bd61d46010d84b4f1c7dd95fd06d65286b5ecb11adf6f9cc68cfa2f0b742ff4"
    ThemeListResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Theme'
        page:
          $ref: '#/components/schemas/PaginationMeta'
    ProductOptionRequest:
      type: object
      required: [name, values]
      properties:
        name:
          type: string
          example: "Size"
        values:
          type: array
          items:
            type: string
          example: ["S", "M", "L"]
    ProductCreateRequest:
      type: object
      required: [title, handle, status, options]
      properties:
        title:
          type: string
          example: "Minimal Hoodie"
        handle:
          type: string
          example: "minimal-hoodie"
        status:
          type: string
          enum: [draft, active, archived]
          example: "draft"
        description_html:
          type: string
          example: "<p>Heavyweight hoodie made for everyday wear.</p>"
        vendor:
          type: string
          example: "Nomad Essentials"
        options:
          type: array
          items:
            $ref: '#/components/schemas/ProductOptionRequest'
    Variant:
      type: object
      required: [id, sku, title, price_amount, is_active]
      properties:
        id:
          type: string
          example: "var_01HZX9C8Y0CFV0A6D4DVV18YQ2"
        sku:
          type: string
          example: "NH-HOODIE-BLK-M"
        title:
          type: string
          example: "Black / M"
        price_amount:
          type: integer
          example: 18990
        compare_at_amount:
          type: integer
          nullable: true
          example: 22990
        is_active:
          type: boolean
          example: true
    Product:
      type: object
      required: [id, title, handle, status, variants]
      properties:
        id:
          type: string
          example: "prod_01HZX92TH06CS4T0D8K0X1F3PW"
        title:
          type: string
          example: "Minimal Hoodie"
        handle:
          type: string
          example: "minimal-hoodie"
        status:
          type: string
          enum: [draft, active, archived]
        vendor:
          type: string
          example: "Nomad Essentials"
        variants:
          type: array
          items:
            $ref: '#/components/schemas/Variant'
    ProductListResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        page:
          $ref: '#/components/schemas/PaginationMeta'
    Address:
      type: object
      required: [country, city, address_line1, postal_code]
      properties:
        country:
          type: string
          example: "Kazakhstan"
        city:
          type: string
          example: "Almaty"
        address_line1:
          type: string
          example: "23 Abay Avenue"
        address_line2:
          type: string
          nullable: true
          example: "Apartment 15"
        postal_code:
          type: string
          example: "050000"
    OrderItemCreateRequest:
      type: object
      required: [variant_id, quantity]
      properties:
        variant_id:
          type: string
          example: "var_01HZX9C8Y0CFV0A6D4DVV18YQ2"
        quantity:
          type: integer
          minimum: 1
          example: 2
    OrderCreateRequest:
      type: object
      required: [customer_email, items, shipping_address]
      properties:
        customer_email:
          type: string
          format: email
          example: "buyer@example.com"
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemCreateRequest'
        shipping_address:
          $ref: '#/components/schemas/Address'
    OrderItem:
      type: object
      required: [variant_id, quantity, snapshot_title, snapshot_price_amount, line_total_amount]
      properties:
        variant_id:
          type: string
          example: "var_01HZX9C8Y0CFV0A6D4DVV18YQ2"
        quantity:
          type: integer
          example: 2
        snapshot_title:
          type: string
          example: "Minimal Hoodie / Black / M"
        snapshot_price_amount:
          type: integer
          example: 18990
        line_total_amount:
          type: integer
          example: 37980
    Order:
      type: object
      required: [id, order_number, status, currency_code, total_amount, items]
      properties:
        id:
          type: string
          example: "ord_01HZXC3M92J6D7V7N0P6R51QJ4"
        order_number:
          type: string
          example: "NH-2026-1042"
        status:
          type: string
          enum: [pending_payment, paid, partially_fulfilled, fulfilled, cancelled, refunded]
        currency_code:
          type: string
          example: "KZT"
        total_amount:
          type: integer
          example: 40480
        placed_at:
          type: string
          format: date-time
          example: "2026-04-24T10:32:15Z"
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
    OrderListResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        page:
          $ref: '#/components/schemas/PaginationMeta'
    WebhookInboundRequest:
      type: object
      required: [provider_name, provider_event_id, event_type, occurred_at, payload, signature]
      properties:
        provider_name:
          type: string
          example: "kaspi_pay"
        provider_event_id:
          type: string
          example: "evt_9c2dbfe8-6d34-4823-81a5-46e0f9c2287a"
        event_type:
          type: string
          example: "payment.succeeded"
        occurred_at:
          type: string
          format: date-time
          example: "2026-04-24T10:33:00Z"
        signature:
          type: string
          example: "t=1713954780,v1=3e9adfe13e2d75b61634c4f325f6c0385fb75767f7be52bbd432f07745d16470"
        payload:
          type: object
          additionalProperties: true
          example:
            order_id: "ord_01HZXC3M92J6D7V7N0P6R51QJ4"
            amount: 40480
            currency: "KZT"
            status: "captured"
    WebhookAccepted:
      type: object
      required: [event_id, status]
      properties:
        event_id:
          type: string
          example: "wh_01HZXD9GBAZ93VTBK5Q3R8WQ4C"
        status:
          type: string
          example: "queued"
    WebhookEvent:
      type: object
      required: [id, provider_name, provider_event_id, event_type, status, attempt_count, received_at]
      properties:
        id:
          type: string
          example: "wh_01HZXD9GBAZ93VTBK5Q3R8WQ4C"
        provider_name:
          type: string
          example: "kaspi_pay"
        provider_event_id:
          type: string
          example: "evt_9c2dbfe8-6d34-4823-81a5-46e0f9c2287a"
        event_type:
          type: string
          example: "payment.succeeded"
        status:
          type: string
          enum: [queued, processing, processed, failed, dead_letter]
        attempt_count:
          type: integer
          example: 1
        last_error:
          type: string
          nullable: true
          example: null
        received_at:
          type: string
          format: date-time
          example: "2026-04-24T10:33:01Z"
    WebhookEventListResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEvent'
        page:
          $ref: '#/components/schemas/PaginationMeta'
